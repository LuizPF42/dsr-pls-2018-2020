name: Publicar relatorio (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # O relatorio e 100% Observable JS e le o dsr_data.json ja versionado,
      # entao nao e necessario instalar R para renderizar.
      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: inst/relatorio
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
